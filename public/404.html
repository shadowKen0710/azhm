<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>守护</title>
    <script>
      // SPA 深链回退（spa-github-pages）：把未知路径编码进 query 后跳回 index。
      // pathSegmentsToKeep=1 —— 项目站点保留 /azhm 前缀。
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
